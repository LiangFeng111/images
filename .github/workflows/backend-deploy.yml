name: Cloudflare Workers Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      # ✅ 安装 wrangler（关键，按用户要求指定版本或最新版）
      - name: Install Wrangler
        run: npm install -g wrangler@4.79.0

      - name: Debug Env
        run: |
          echo "TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ✅ 直接 deploy
      - name: Deploy
        run: |
          cd backend
          # 从根目录的 config.json 读取非敏感配置
          GITHUB_REPO=$(jq -r '.GITHUB_REPO' ../config.json)
          GITHUB_BRANCH=$(jq -r '.GITHUB_BRANCH' ../config.json)
          
          # 同步 Secrets (Token 和 Auth 密钥)
          if [ ! -z "${{ secrets.GH_TOKEN }}" ]; then echo "${{ secrets.GH_TOKEN }}" | wrangler secret put GITHUB_TOKEN; fi
          if [ ! -z "${{ secrets.AUTH_SECRET }}" ]; then echo "${{ secrets.AUTH_SECRET }}" | wrangler secret put AUTH_SECRET; fi
          
          # 部署时注入从 JSON 读取的变量
          wrangler deploy --var GITHUB_REPO:$GITHUB_REPO --var GITHUB_BRANCH:$GITHUB_BRANCH
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
